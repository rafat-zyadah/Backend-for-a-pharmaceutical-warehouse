services:
  postgres:
    image: postgres:16-alpine
    container_name: pharmacy_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: pharmacy_warehouse
      POSTGRES_USER: pharmacy
      POSTGRES_PASSWORD: pharmacy
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pharmacy_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
